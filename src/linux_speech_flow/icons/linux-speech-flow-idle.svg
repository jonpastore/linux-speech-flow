<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Mic capsule -->
  <rect x="8.5" y="2" width="7" height="11" rx="3.5" fill="#9E9E9E"/>
  <!-- Stand arc (U-shape below capsule) -->
  <path d="M 8.5 13 Q 8.5 18 12 18 Q 15.5 18 15.5 13" stroke="#9E9E9E" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Stem -->
  <line x1="12" y1="18" x2="12" y2="21" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="9" y1="21" x2="15" y2="21" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round"/>
</svg>
