<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Pulsing ring (medium, fading) -->
  <circle cx="12" cy="12" r="10.5" stroke="#EF5350" stroke-width="1.5" fill="none" opacity="0.45"/>
  <!-- Mic capsule -->
  <rect x="8.5" y="2" width="7" height="11" rx="3.5" fill="#EF5350"/>
  <!-- Stand arc -->
  <path d="M 8.5 13 Q 8.5 18 12 18 Q 15.5 18 15.5 13" stroke="#EF5350" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Stem -->
  <line x1="12" y1="18" x2="12" y2="21" stroke="#EF5350" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="9" y1="21" x2="15" y2="21" stroke="#EF5350" stroke-width="1.5" stroke-linecap="round"/>
</svg>
