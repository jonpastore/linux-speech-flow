name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history so setuptools-scm can derive the version

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgirepository1.0-dev gir1.2-glib-2.0 gir1.2-gtk-4.0 \
            libcairo2-dev pkg-config python3-dev \
            libpulse-dev libdbus-1-dev \
            xdotool xclip libnotify-bin xvfb

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test deps
        run: |
          pip install 'PyGObject<3.52'  # 3.52+ needs girepository-2.0; runner has libgirepository1.0-dev
          pip install -e . pytest

      - name: Run tests
        run: xvfb-run -a pytest --tb=short -q

  security:
    name: Security scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgirepository1.0-dev libcairo2-dev pkg-config python3-dev \
            libpulse-dev libdbus-1-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install app + scanners
        run: |
          pip install 'PyGObject<3.52'  # girepository-1.0 boundary
          pip install . 'bandit[toml]' pip-audit ruff

      - name: Bandit — static security analysis (fail on medium+)
        run: bandit -r src/ -c pyproject.toml --severity-level medium

      - name: pip-audit — dependency vulnerabilities (fail on any CVE)
        run: pip-audit

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

  build-wheel:
    name: Build wheel
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history so setuptools-scm can derive the version
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl
          if-no-files-found: error

  build-deb:
    name: Build .deb (${{ matrix.dist }})
    runs-on: ubuntu-24.04
    needs: test
    # One .deb per target distro. Each builds the bundled venv with THAT distro's
    # system python (Ubuntu 24.04=3.12, Ubuntu 22.04=3.10, Debian 12=3.11) so the
    # interpreter, stdlib and libpython resolve from the target's python3 package.
    # Debian 11 (python 3.9) is excluded — below requires-python >=3.10.
    strategy:
      fail-fast: false
      matrix:
        include:
          - dist: ubuntu-24.04
            image: ubuntu:24.04
          - dist: ubuntu-22.04
            image: ubuntu:22.04
          - dist: debian-12
            image: debian:12
    container: ${{ matrix.image }}
    steps:
      - name: Install build deps (${{ matrix.image }})
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update -q
          apt-get install -y \
            git ca-certificates curl \
            python3 python3-venv python3-dev python3-pip \
            libgirepository1.0-dev libcairo2-dev pkg-config \
            libpulse-dev libdbus-1-dev \
            ruby ruby-dev build-essential
          gem install --no-document fpm

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Allow git in container workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build .deb
        run: |
          # Version via an isolated venv — avoids PEP 668 differences across distros.
          python3 -m venv /tmp/scm
          /tmp/scm/bin/pip install -q setuptools-scm
          VERSION=$(/tmp/scm/bin/python -m setuptools_scm)
          echo "Building linux-speech-flow $VERSION for ${{ matrix.dist }}"

          # Bundled venv built with THIS distro's system python.
          mkdir -p dist-deb/opt/linux-speech-flow
          /usr/bin/python3 -m venv --copies dist-deb/opt/linux-speech-flow/venv
          # Pin PyGObject: trayer pulls it unpinned; 3.52+ needs girepository-2.0.
          dist-deb/opt/linux-speech-flow/venv/bin/pip install --quiet 'PyGObject<3.52'
          dist-deb/opt/linux-speech-flow/venv/bin/pip install --quiet .

          # Rewrite build-path shebangs in the venv scripts to the install path,
          # else the console script points at the ephemeral CI build dir.
          BUILD_VENV="$(pwd)/dist-deb/opt/linux-speech-flow/venv"
          sed -i "1s|^#!${BUILD_VENV}/|#!/opt/linux-speech-flow/venv/|" \
            dist-deb/opt/linux-speech-flow/venv/bin/* 2>/dev/null || true

          # /usr/local/bin wrapper (dpkg-owned; postrm must not remove it).
          mkdir -p dist-deb/usr/local/bin
          printf '#!/bin/bash\nexec /opt/linux-speech-flow/venv/bin/linux-speech-flow "$@"\n' \
            > dist-deb/usr/local/bin/linux-speech-flow
          chmod +x dist-deb/usr/local/bin/linux-speech-flow

          fpm -s dir -t deb \
            -n linux-speech-flow \
            -v "$VERSION" \
            -p "linux-speech-flow_${VERSION}_${{ matrix.dist }}_amd64.deb" \
            --after-install scripts/postinst.sh \
            --after-remove scripts/postrm.sh \
            --depends xdotool \
            --depends xclip \
            --depends libnotify-bin \
            --depends libpulse0 \
            --depends python3 \
            --depends "gir1.2-appindicator3-0.1 | gir1.2-ayatanaappindicator3-0.1" \
            --description "Speech-to-text Linux app with system tray and Slack integration" \
            --url "https://github.com/${{ github.repository }}" \
            -C dist-deb \
            .

      - name: Verify package sanity
        run: |
          dist-deb/opt/linux-speech-flow/venv/bin/python3 --version
          head -1 dist-deb/opt/linux-speech-flow/venv/bin/linux-speech-flow
          head -1 dist-deb/opt/linux-speech-flow/venv/bin/linux-speech-flow \
            | grep -qx '#!/opt/linux-speech-flow/venv/bin/python3'

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.dist }}
          path: "*.deb"
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-24.04
    needs: [build-wheel, build-deb]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # for GitHub Release creation
      id-token: write   # for PyPI trusted publishing (OIDC — no API token needed)
    steps:
      - name: Download all .deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: deb-*
          path: debs
          merge-multiple: true

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: debs/*.deb
          generate_release_notes: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
