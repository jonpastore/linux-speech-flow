name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgirepository1.0-dev gir1.2-glib-2.0 gir1.2-gtk-4.0 \
            libcairo2-dev pkg-config python3-dev \
            libpulse-dev libdbus-1-dev \
            xdotool xclip libnotify-bin xvfb

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test deps
        run: |
          pip install 'PyGObject<3.52'  # 3.52+ needs girepository-2.0; runner has libgirepository1.0-dev
          pip install -e . pytest

      - name: Run tests
        run: xvfb-run -a pytest --tb=short -q

  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgirepository1.0-dev libcairo2-dev pkg-config python3-dev \
            libpulse-dev libdbus-1-dev ruby

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Build .deb (bundled venv via fpm)
        run: |
          gem install fpm --no-document
          VERSION=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          # Staging layout: /opt/linux-speech-flow/venv + /usr/local/bin wrapper
          mkdir -p dist-deb/opt/linux-speech-flow
          pip install 'PyGObject<3.52'  # 3.52+ needs girepository-2.0; runner has libgirepository1.0-dev
          python3 -m venv --copies dist-deb/opt/linux-speech-flow/venv
          dist-deb/opt/linux-speech-flow/venv/bin/pip install --quiet .
          mkdir -p dist-deb/usr/local/bin
          printf '#!/bin/bash\nexec /opt/linux-speech-flow/venv/bin/linux-speech-flow "$@"\n' \
            > dist-deb/usr/local/bin/linux-speech-flow
          chmod +x dist-deb/usr/local/bin/linux-speech-flow
          fpm -s dir -t deb \
            -n linux-speech-flow \
            -v "$VERSION" \
            --depends xdotool \
            --depends xclip \
            --depends libnotify-bin \
            --depends libpulse0 \
            --depends "gir1.2-appindicator3-0.1 | gir1.2-ayatanaappindicator3-0.1" \
            --description "Speech-to-text Linux app with system tray and Slack integration" \
            --url "https://github.com/${{ github.repository }}" \
            -C dist-deb \
            .

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-speech-flow-deb
          path: "*.deb"
          if-no-files-found: error

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-speech-flow-wheel
          path: dist/*.whl
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-24.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # for GitHub Release creation
      id-token: write   # for PyPI trusted publishing (OIDC — no API token needed)
    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-speech-flow-deb

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-speech-flow-wheel
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.deb"
          generate_release_notes: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
