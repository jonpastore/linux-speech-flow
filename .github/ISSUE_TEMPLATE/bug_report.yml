name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: input
    id: description
    attributes:
      label: What happened?
      placeholder: "A clear description of the bug"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Press Ctrl+Alt+R to start recording
        2. ...
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Ubuntu 24.04
        - Ubuntu 22.04
        - Pop!_OS 22.04
        - Debian 12
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I have checked existing issues for duplicates
          required: true
